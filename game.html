<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$USELESS — Degen Tic-Tac-Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --green: #00ff41;
      --red: #ff2d55;
      --yellow: #ffe600;
      --white: #f0f0f0;
      --dim: #0d0d0d;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: transparent;
      color: var(--white);
      font-family: 'Share Tech Mono', monospace;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px 20px;
      gap: 14px;
      cursor: crosshair;
    }

    /* BOT PICKER */
    .bot-picker-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: #333;
      width: 100%;
      max-width: 400px;
      margin-bottom: 4px;
    }

    .bot-picker {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      width: 100%;
      max-width: 400px;
      background: #111;
      border: 1px solid #111;
    }

    .bot-card {
      background: var(--bg);
      padding: 8px 4px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
      position: relative;
    }
    .bot-card:hover { background: #111; }
    .bot-card.selected { border-color: var(--green); background: #0a0a0a; }

    .bot-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 0.05em;
      color: var(--white);
      line-height: 1;
    }
    .bot-card.selected .bot-name { color: var(--green); }

    .bot-elo {
      font-size: 9px;
      color: #333;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }
    .bot-card.selected .bot-elo { color: #555; }

    .bot-xp-bar {
      width: 100%;
      height: 2px;
      background: #111;
      margin-top: 4px;
      overflow: hidden;
    }
    .bot-xp-fill {
      height: 100%;
      background: var(--green);
      transition: width 0.6s ease;
    }

    .bot-level-badge {
      position: absolute;
      top: 3px; right: 3px;
      font-size: 8px;
      color: var(--yellow);
      letter-spacing: 0;
    }

    /* SCOREBOARD */
    .scoreboard {
      width: 100%; max-width: 400px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      background: #111; border: 1px solid #111; gap: 1px;
    }
    .score-block { background: var(--bg); padding: 10px 8px; text-align: center; }
    .score-name  { font-size: 9px; letter-spacing: 0.2em; color: #444; margin-bottom: 3px; }
    .score-val   { font-family: 'Bebas Neue', sans-serif; font-size: 34px; line-height: 1; }
    .score-you   { color: var(--green); }
    .score-bot   { color: var(--red); }
    .score-divider {
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #1a1a1a; padding: 0 4px;
    }

    /* STATUS */
    .status-bar {
      width: 100%; max-width: 400px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: var(--dim); border: 1px solid #111;
    }
    .player-tag { display: flex; align-items: center; gap: 6px; }
    .player-sym { font-family: 'Bebas Neue', sans-serif; font-size: 22px; }
    .sym-x { color: var(--green); }
    .sym-o { color: var(--red); }
    .turn-msg {
      font-family: 'VT323', monospace; font-size: 17px;
      letter-spacing: 0.08em; text-align: center;
    }
    .turn-you  { color: var(--green); animation: blink-t 1s step-end infinite; }
    .turn-bot  { color: #444; }
    .turn-over { color: var(--yellow); animation: none; }
    @keyframes blink-t { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* BOARD */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px; background: #111; border: 1px solid #111;
      width: 100%; max-width: 400px;
    }
    .cell {
      background: var(--bg);
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(44px, 13vw, 72px);
      cursor: pointer; transition: background 0.1s;
      position: relative; overflow: hidden; user-select: none;
    }
    .cell:hover:not(.taken):not(.locked) { background: #0e0e0e; }
    .cell:hover:not(.taken):not(.locked)::after {
      content: 'X'; color: rgba(0,255,65,0.1);
      font-family: 'Bebas Neue', sans-serif; font-size: inherit; position: absolute;
    }
    .cell.taken, .cell.locked { cursor: default; }
    .mark { animation: pop 0.18s cubic-bezier(.175,.885,.32,1.275); display: block; line-height: 1; }
    @keyframes pop {
      0%   { transform: scale(0.2) rotate(-10deg); opacity: 0; }
      70%  { transform: scale(1.2) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .mark-x { color: var(--green); text-shadow: 0 0 16px rgba(0,255,65,0.6); }
    .mark-o { color: var(--red);   text-shadow: 0 0 16px rgba(255,45,85,0.6); }
    .cell.winning-cell { background: #0c0c0c; animation: win-pulse 0.5s ease infinite alternate; }
    @keyframes win-pulse {
      from { box-shadow: inset 0 0 0 2px rgba(255,230,0,0.3); }
      to   { box-shadow: inset 0 0 0 2px var(--yellow); }
    }

    /* BOT CHAT BUBBLE */
    .bot-bubble {
      width: 100%; max-width: 400px;
      min-height: 36px;
      background: #0a0a0a;
      border: 1px solid #111;
      border-left: 2px solid var(--red);
      padding: 8px 12px;
      font-family: 'VT323', monospace;
      font-size: 16px;
      color: #555;
      letter-spacing: 0.05em;
      transition: color 0.3s;
    }
    .bot-bubble.active { color: var(--red); }

    /* RESULT */
    .result-banner {
      width: 100%; max-width: 400px;
      padding: 14px; text-align: center;
      background: var(--dim); border: 1px solid #111;
      display: none; flex-direction: column; gap: 4px;
    }
    .result-banner.show { display: flex; }
    .result-title { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 0.06em; line-height: 1; }
    .r-win  { color: var(--yellow); text-shadow: 0 0 20px rgba(255,230,0,0.4); }
    .r-lose { color: var(--red); }
    .r-draw { color: #555; }
    .result-quip { font-family: 'VT323', monospace; font-size: 16px; color: #444; letter-spacing: 0.05em; }

    /* LEVEL UP */
    .levelup-toast {
      position: fixed; bottom: 12px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--yellow); color: #000;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 0.1em;
      padding: 10px 24px;
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      z-index: 999; pointer-events: none;
    }
    .levelup-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* BUTTONS */
    .btn-row { display: flex; gap: 6px; width: 100%; max-width: 400px; }
    .btn {
      flex: 1;
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 11px 8px; border: 2px solid;
      cursor: pointer; background: transparent; transition: all 0.15s;
      text-decoration: none; text-align: center; display: inline-block;
    }
    .btn-green { color: #000; background: var(--green); border-color: var(--green); }
    .btn-green:hover { box-shadow: 0 0 24px rgba(0,255,65,0.5); }
    .btn-outline { color: var(--white); border-color: #222; }
    .btn-outline:hover { border-color: #555; background: #0d0d0d; }
  </style>
</head>
<body>

  <!-- BOT PICKER -->

<script>
// ─────────────────────────────────────────
// BOT DEFINITIONS — names, personalities, learning
// ─────────────────────────────────────────

    win:     ["Proof of work: complete.", "Self-sovereign win.", "XEN ALWAYS WINS.", "The proof is in the loss.", "Verified. You lost."],
    lose:    ["Not enough proof.", "You out-xenned me.", "Rare occurrence.", "The community wins.", "I'll mint this loss as an NFT."],
    draw:    ["Two truths. One board.", "XEN draws. XEN wins anyway.", "Symbolic tie.", "The universe is balanced.", "We are all XEN."],
    think:   ["XEN SELF-COMPUTING...", "PROOF OF THINK...", "XEN CALCULATING..."]
  }
];

// ─────────────────────────────────────────
// LEARNING ENGINE — persisted via localStorage
// Each bot tracks: wins, losses, draws, xp, level
// and a move-weight table that shifts with outcomes
// ─────────────────────────────────────────
const WINS_LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
const XP_PER_WIN = 30;
const XP_PER_DRAW = 10;
const XP_PER_LOSS = 5;
const XP_PER_LEVEL = 100;

function loadBotData() {
  try {
    const saved = localStorage.getItem('useless_bots');
    return saved ? JSON.parse(saved) : {};
  } catch(e) { return {}; }
}

function saveBotData(data) {
  try { localStorage.setItem('useless_bots', JSON.stringify(data)); } catch(e) {}
}

function getBotState(id) {
  const all = loadBotData();
  if (!all[id]) {
    all[id] = { wins:0, losses:0, draws:0, xp:0, level:1, weights: defaultWeights() };
    saveBotData(all);
  }
  return all[id];
}

function setBotState(id, state) {
  const all = loadBotData();
  all[id] = state;
  saveBotData(all);
}

// Position weights: how much the bot "prefers" each cell
// [centre, corners, edges] — adjusted by learning
function defaultWeights() {
  return [1,1,1,1,1,1,1,1,1]; // index 0–8
}

// ─────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────
let board = Array(9).fill(null);
let gameOver = false;
let playerTurn = true;
let selectedBotId = 'jack';
let currentBotDef = BOT_DEFS[0];
let scores = { you: 0, bot: 0 };
let playerMoves = []; // track player's moves this game for learning

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
function init() {
  renderBotPicker();
  selectBot('jack');
}

function renderBotPicker() {
  const picker = document.getElementById('bot-picker');
  picker.innerHTML = '';
  BOT_DEFS.forEach(bot => {
    const state = getBotState(bot.id);
    const xpPct = ((state.xp % XP_PER_LEVEL) / XP_PER_LEVEL * 100).toFixed(0);
    const card = document.createElement('div');
    card.className = 'bot-card';
    card.id = 'bot-card-' + bot.id;
    card.onclick = () => selectBot(bot.id);
    card.innerHTML = `
      <div class="bot-level-badge">Lv${state.level}</div>
      <div class="bot-name" style="color:${bot.color}">${bot.name}</div>
      <div class="bot-elo">${state.wins}W ${state.losses}L ${state.draws}D</div>
      <div class="bot-xp-bar"><div class="bot-xp-fill" style="width:${xpPct}%;background:${bot.color}"></div></div>
    `;
    picker.appendChild(card);
  });
}

function selectBot(id) {
  selectedBotId = id;
  currentBotDef = BOT_DEFS.find(b => b.id === id);
  document.querySelectorAll('.bot-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('bot-card-' + id).classList.add('selected');
  document.getElementById('bot-tag-name').textContent = currentBotDef.name;
  document.getElementById('bot-score-label').textContent = currentBotDef.name + ' (O)';
  scores = { you: 0, bot: 0 };
  document.getElementById('score-you').textContent = '0';
  document.getElementById('score-bot').textContent = '0';
  setBotBubble(rnd(currentBotDef.taunt));
  resetGame();
}

// ─────────────────────────────────────────
// GAMEPLAY
// ─────────────────────────────────────────
function move(idx) {
  if (gameOver || !playerTurn || board[idx]) return;
  playerMoves.push(idx);
  placeMarker(idx, 'X');
  if (checkEnd()) return;
  playerTurn = false;
  lockBoard();
  setTurnMsg('bot');
  setBotBubble(rnd(currentBotDef.think), true);
  const state = getBotState(selectedBotId);
  const delay = Math.max(300, 700 - (state.level * 40)); // higher level = faster response
  setTimeout(botMove, delay + Math.random() * 200);
}

function botMove() {
  const idx = getBotMove();
  placeMarker(idx, 'O');
  if (checkEnd()) return;
  setBotBubble(rnd(currentBotDef.taunt));
  playerTurn = true;
  unlockBoard();
  setTurnMsg('you');
}

function placeMarker(idx, sym) {
  board[idx] = sym;
  const cell = document.getElementById('c' + idx);
  const span = document.createElement('span');
  span.className = 'mark mark-' + sym.toLowerCase();
  span.textContent = sym;
  cell.appendChild(span);
  cell.classList.add('taken');
}

// ─────────────────────────────────────────
// ─────────────────────────────────────────
// BOT AI — fully rewritten, level-scaled
// ─────────────────────────────────────────

// Fixed minimax with depth so bot prefers fastest wins & delays losses
function minimax(b, turn, depth) {
  const line = getWinLine(b);
  if (line) return { score: b[line[0]] === 'O' ? 10 - depth : depth - 10 };
  const empty = b.map((v,i) => v ? null : i).filter(i => i !== null);
  if (!empty.length) return { score: 0 };
  const moves = [];
  for (const i of empty) {
    const nb = [...b]; nb[i] = turn;
    const result = minimax(nb, turn === 'O' ? 'X' : 'O', depth + 1);
    moves.push({ idx: i, score: result.score });
  }
  return turn === 'O'
    ? moves.reduce((a,b) => b.score > a.score ? b : a)
    : moves.reduce((a,b) => b.score < a.score ? b : a);
}

// Find immediate win or block move for sym
function findThreat(sym) {
  const empty = board.map((v,i) => v ? null : i).filter(i => i !== null);
  for (const i of empty) {
    const t = [...board]; t[i] = sym;
    if (getWinLine(t)) return i;
  }
  return -1;
}

// Detect fork: a move that creates TWO simultaneous win threats
function findFork(sym) {
  const empty = board.map((v,i) => v ? null : i).filter(i => i !== null);
  for (const i of empty) {
    const t = [...board]; t[i] = sym;
    let threats = 0;
    for (const j of empty) {
      if (j === i) continue;
      const t2 = [...t]; t2[j] = sym;
      if (getWinLine(t2)) threats++;
    }
    if (threats >= 2) return i;
  }
  return -1;
}

// Strategic positional play: centre > opposite corner > corner > edge
function strategicMove() {
  const empty = board.map((v,i) => v ? null : i).filter(i => i !== null);
  // Centre
  if (!board[4]) return 4;
  // Opposite corner strategy: if player took a corner, take opposite
  const oppCorners = [[0,8],[2,6],[6,2],[8,0]];
  for (const [mine, opp] of oppCorners) {
    if (board[opp] === 'X' && !board[mine]) return mine;
  }
  // Any empty corner
  const corners = [0,2,6,8].filter(i => !board[i]);
  if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
  // Any empty edge
  const edges = [1,3,5,7].filter(i => !board[i]);
  if (edges.length) return edges[Math.floor(Math.random() * edges.length)];
  return empty[Math.floor(Math.random() * empty.length)];
}

function weightedRandom(empty, weights) {
  const validWeights = empty.map(i => Math.max(0.1, weights[i]));
  const total = validWeights.reduce((a,b) => a+b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < empty.length; i++) {
    r -= validWeights[i];
    if (r <= 0) return empty[i];
  }
  return empty[empty.length - 1];
}

function getBotMove() {
  const state = getBotState(selectedBotId);
  const level = state.level;
  const empty = board.map((v,i) => v ? null : i).filter(i => i !== null);
  if (!empty.length) return -1;

  // ── LEVEL 1: Mostly random, rarely blocks ──
  if (level <= 1) {
    if (Math.random() < 0.2) {
      const blk = findThreat('X'); if (blk !== -1) return blk;
    }
    return empty[Math.floor(Math.random() * empty.length)];
  }

  // ── LEVEL 2: Always takes win, sometimes blocks, random rest ──
  if (level <= 2) {
    const win = findThreat('O'); if (win !== -1) return win;
    if (Math.random() < 0.5) { const blk = findThreat('X'); if (blk !== -1) return blk; }
    return empty[Math.floor(Math.random() * empty.length)];
  }

  // ── LEVEL 3: Always wins + blocks, no strategy ──
  if (level <= 3) {
    const win = findThreat('O'); if (win !== -1) return win;
    const blk = findThreat('X'); if (blk !== -1) return blk;
    return empty[Math.floor(Math.random() * empty.length)];
  }

  // ── LEVEL 4–5: Wins, blocks, basic positional (centre/corners) ──
  if (level <= 5) {
    const win = findThreat('O'); if (win !== -1) return win;
    const blk = findThreat('X'); if (blk !== -1) return blk;
    if (!board[4]) return 4;
    const corners = [0,2,6,8].filter(i => !board[i]);
    if (corners.length && Math.random() < 0.7)
      return corners[Math.floor(Math.random() * corners.length)];
    return empty[Math.floor(Math.random() * empty.length)];
  }

  // ── LEVEL 6–7: Wins, blocks, fork attacks, full strategy ──
  if (level <= 7) {
    const win = findThreat('O'); if (win !== -1) return win;
    const blk = findThreat('X'); if (blk !== -1) return blk;
    const fork = findFork('O'); if (fork !== -1) return fork;
    const blockFork = findFork('X'); if (blockFork !== -1) return blockFork;
    return strategicMove();
  }

  // ── LEVEL 8–9: Near-perfect — partial minimax (depth 4) ──
  if (level <= 9) {
    const win = findThreat('O'); if (win !== -1) return win;
    const blk = findThreat('X'); if (blk !== -1) return blk;
    const fork = findFork('O'); if (fork !== -1) return fork;
    const blockFork = findFork('X'); if (blockFork !== -1) return blockFork;
    // Minimax limited to depth 4 — strong but not perfect
    function limitedMinimax(b, turn, depth) {
      if (depth >= 4) return { score: 0 };
      const line = getWinLine(b);
      if (line) return { score: b[line[0]] === 'O' ? 10 - depth : depth - 10 };
      const emp = b.map((v,i) => v ? null : i).filter(i => i !== null);
      if (!emp.length) return { score: 0 };
      const moves = emp.map(i => {
        const nb = [...b]; nb[i] = turn;
        return { idx: i, score: limitedMinimax(nb, turn === 'O' ? 'X' : 'O', depth + 1).score };
      });
      return turn === 'O'
        ? moves.reduce((a,b) => b.score > a.score ? b : a)
        : moves.reduce((a,b) => b.score < a.score ? b : a);
    }
    return limitedMinimax([...board], 'O', 0).idx;
  }

  // ── LEVEL 10+: Full minimax with depth — completely unbeatable ──
  return minimax([...board], 'O', 0).idx;
}

// ─────────────────────────────────────────
// LEARNING — update weights + xp after game
// ─────────────────────────────────────────
function learnFromGame(outcome) {
  const state = getBotState(selectedBotId);

  // Give XP
  if (outcome === 'bot_win')  { state.wins++;   state.xp += XP_PER_WIN; }
  if (outcome === 'you_win')  { state.losses++; state.xp += XP_PER_LOSS; }
  if (outcome === 'draw')     { state.draws++;  state.xp += XP_PER_DRAW; }

  // Level up check
  const newLevel = Math.floor(state.xp / XP_PER_LEVEL) + 1;
  const leveledUp = newLevel > state.level;
  state.level = newLevel;

  // Adjust weights based on outcome
  // If bot won: boost cells the bot used this game (encourage repetition)
  // If bot lost: boost cells the player used (bot should contest those next time)
  const botCells  = board.map((v,i) => v === 'O' ? i : null).filter(i => i !== null);
  const youCells  = playerMoves;

  if (outcome === 'bot_win') {
    botCells.forEach(i => { state.weights[i] = Math.min(5, state.weights[i] + 0.3); });
  }
  if (outcome === 'you_win') {
    youCells.forEach(i => { state.weights[i] = Math.min(5, state.weights[i] + 0.4); });
    botCells.forEach(i => { state.weights[i] = Math.max(0.1, state.weights[i] - 0.1); });
  }
  if (outcome === 'draw') {
    botCells.forEach(i => { state.weights[i] = Math.min(5, state.weights[i] + 0.1); });
  }

  setBotState(selectedBotId, state);

  // Refresh bot picker card
  const xpPct = ((state.xp % XP_PER_LEVEL) / XP_PER_LEVEL * 100).toFixed(0);
  const card = document.getElementById('bot-card-' + selectedBotId);
  if (card) {
    card.querySelector('.bot-level-badge').textContent = 'Lv' + state.level;
    card.querySelector('.bot-elo').textContent = `${state.wins}W ${state.losses}L ${state.draws}D`;
    card.querySelector('.bot-xp-fill').style.width = xpPct + '%';
  }

  if (leveledUp) {
    showLevelUp(currentBotDef.name + ' LEVELED UP! LV' + state.level);
  }
}

// ─────────────────────────────────────────
// CHECK END
// ─────────────────────────────────────────
function checkEnd() {
  const line = getWinLine(board);
  if (line) {
    line.forEach(i => document.getElementById('c' + i).classList.add('winning-cell'));
    const youWon = board[line[0]] === 'X';
    if (youWon) scores.you++; else scores.bot++;
    updateScores();
    const outcome = youWon ? 'you_win' : 'bot_win';
    learnFromGame(outcome);
    setBotBubble(rnd(youWon ? currentBotDef.lose : currentBotDef.win));
    showResult(
      youWon ? 'YOU WIN 🟩' : currentBotDef.name + ' WINS',
      youWon ? rnd(WIN_QUIPS) : rnd(LOSE_QUIPS),
      youWon ? 'r-win' : 'r-lose'
    );
    gameOver = true; return true;
  }
  if (board.every(c => c)) {
    learnFromGame('draw');
    setBotBubble(rnd(currentBotDef.draw));
    showResult('DRAW', rnd(DRAW_QUIPS), 'r-draw');
    gameOver = true; return true;
  }
  return false;
}

// ─────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────
const WIN_QUIPS  = ["Zero utility. Max skill.", "Not useless after all.", "Pure chaos. Pure win.", "NGMI... oh wait, you GM'd.", "Beating a bot. A degen victory."];
const LOSE_QUIPS = ["No utility = no defence.", "Rekt by a machine. Classic degen.", "Maximum vibes. Minimum skill.", "No promises, no wins.", "The bot had zero roadmap and still won."];
const DRAW_QUIPS = ["Zero winners. Maximum chaos.", "Both equally useless.", "A draw. How very on-brand.", "Perfectly balanced. As all things should be."];

function getWinLine(b) {
  for (const [a,c,d] of WINS_LINES) if (b[a] && b[a]===b[c] && b[a]===b[d]) return [a,c,d];
  return null;
}

function lockBoard()   { document.querySelectorAll('.cell:not(.taken)').forEach(c => c.classList.add('locked')); }
function unlockBoard() { document.querySelectorAll('.cell').forEach(c => c.classList.remove('locked')); }

function setTurnMsg(who) {
  const el = document.getElementById('turn-msg');
  const map = {
    you:  ['YOUR TURN',              'turn-msg turn-you'],
    bot:  [currentBotDef.name + "'S TURN", 'turn-msg turn-bot'],
    over: ['GAME OVER',              'turn-msg turn-over']
  };
  el.textContent = map[who][0];
  el.className   = map[who][1];
}

function setBotBubble(text, active = false) {
  const el = document.getElementById('bot-bubble');
  el.textContent = currentBotDef.name + ': "' + text + '"';
  el.className = 'bot-bubble' + (active ? ' active' : '');
}

function showResult(title, quip, cls) {
  const b = document.getElementById('result-banner');
  const t = document.getElementById('result-title');
  t.textContent = title; t.className = 'result-title ' + cls;
  document.getElementById('result-quip').textContent = quip;
  b.classList.add('show');
  setTurnMsg('over');
  lockBoard();
}

function updateScores() {
  document.getElementById('score-you').textContent = scores.you;
  document.getElementById('score-bot').textContent = scores.bot;
}

function showLevelUp(msg) {
  const el = document.getElementById('levelup-toast');
  el.textContent = '⚡ ' + msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function resetGame() {
  board = Array(9).fill(null);
  gameOver = false; playerTurn = true;
  playerMoves = [];
  document.querySelectorAll('.cell').forEach(c => { c.innerHTML = ''; c.className = 'cell'; });
  document.getElementById('result-banner').classList.remove('show');
  setTurnMsg('you');
  setBotBubble(rnd(currentBotDef.taunt));
}

function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

init();
</script>
